# Keeps dependencies up to date.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
    # Use Conventional Commits so the Commit Lint check passes.
    commit-message:
      prefix: "ci"
      include: "scope"
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: weekly
    # Use Conventional Commits so the Commit Lint check passes.
    commit-message:
      prefix: "build"
      include: "scope"
