name: Build

# Triggered manually, or called by release-please.yml when a release is cut.
# When `release_tag` is supplied, the built APK is attached to that GitHub
# Release as an asset so app stores like Obtainium can pick it up.
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      release_tag:
        description: 'Tag of the release to attach the APK to (empty = artifact only).'
        type: string
        required: false
        default: ''

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest
    permissions:
      # Needed for `gh release upload` to attach the APK to the release.
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v7
        with:
          name: pacestrip-apk
          path: build/app/outputs/flutter-apk/app-release.apk
      - name: Attach APK to release
        if: ${{ inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          apk="pacestrip-${{ inputs.release_tag }}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "$apk"
          gh release upload "${{ inputs.release_tag }}" "$apk" --clobber
