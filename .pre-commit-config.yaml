# Enforces Conventional Commits on every commit message.
# Install once per clone:  pre-commit install --install-hooks
#   (this picks up the commit-msg hook via default_install_hook_types below)
default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        # Listing types explicitly overrides the defaults, so the full default
        # set is repeated here plus `wip` for work-in-progress commits.
        args: [--strict, --verbose, build, chore, ci, docs, feat, fix, perf, refactor, revert, style, test, wip]

  # Generic hygiene hooks — safe for any language. Remove what you don't want.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-yaml
      - id: check-json
